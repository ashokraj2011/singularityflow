version: 1
inputsMode: record

# Sequence gates are immutable per work item. Soft gates ask for an explicit
# interactive confirmation and audit the override; hard gates exit immediately.
sequenceGates:
  default: soft
  completion: hard
  currentPhase: hard
  freshGeneration: hard
  generationCommit: hard
  remoteGeneration: hard
  publicationPending: hard
defaultBaseBranch: main
workItemRoot: singularity/work-items
idPattern: '^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$'

git:
  remote: origin
  publish: required

templatesRoot: singularity/templates
personaPromptsRoot: singularity/personas

planning:
  enabled: true
  promptSource: singularity/prompts/copilot-planning.md
  maxContextBytes: 1048576

worldModel:
  views: [business, architecture, development, testing, release, operations, security]
  outputDir: singularity/world-model
  promptSource: singularity/prompts/worldmodel-builder.md
  grounding: enforce
  staleness: warn
  injection:
    placeholder: "{{WORLD_MODEL}}"
    mode: append
    maxBytes: 32768
    rules: []
    # Rules add focused context to the active persona prompt. Phase-required
    # views below are always loaded separately and cannot be removed by rules.
    # - when: { persona: architect, phase: design }
    #   include: [domains/payments.md]
    # - when: { changedPaths: "src/api/**" }
    #   include: [domains/api.md]
    # - when: { labels: security }
    #   include: [views/security.md]

tokens:
  mode: exact-or-unavailable
  # Optional rates per million tokens, keyed by the exact provider model name.
  # No pricing is assumed when this map is omitted.
  # pricing:
  #   provider-model-name: { input: 3, output: 15, cachedInput: 0.3 }

documents:
  allowedPhases: [intake, requirements, design, implementation-spec, reproduction, fix-design, fix-spec]
  maxFileBytes: 26214400
  maxPreviewBytes: 1048576

collaboration:
  # Assignments coordinate people but never restrict who may select a persona.
  assignmentMode: suggested
  approvalReminderAfterHours: 24
  notifications: [terminal]

session:
  # Every new Copilot session selects a work/Jira ID, fetches its remote branch,
  # fast-forwards safely, and only then binds the contributor's persona.
  workItemSelection: prompt
  personaSelection: prompt
  promptOnNewSession: true
  promptOnResume: false
  requireBeforeTools: true

personas:
  developer:
    label: Developer
    description: Implement scoped changes and tests.
    prompt: developer.md
    suggestedPhases: [implementation]
    worldModelViews: [development, testing]
    mayApprove: [implementation]
  architect:
    label: Architect
    description: Define boundaries, contracts, risks, and implementation specifications.
    prompt: architect.md
    suggestedPhases: [design, implementation-spec, fix-design, fix-spec]
    worldModelViews: [architecture, security]
    mayApprove: [design, implementation-spec, fix-design, fix-spec, conformance]
  product-owner:
    label: Product owner
    description: Define the problem, scope, and measurable acceptance criteria.
    prompt: product-owner.md
    suggestedPhases: [intake, requirements]
    worldModelViews: [business]
    mayApprove: [intake, requirements]
  qa:
    label: QA
    description: Verify acceptance criteria and collect reproducible evidence.
    prompt: qa.md
    suggestedPhases: [reproduction, verification, visual-verification, conformance]
    worldModelViews: [testing, development, security]
    mayApprove: [reproduction, verification, visual-verification, conformance]
  product-designer:
    label: Product designer
    description: Turn exported design evidence into explicit screens, states, interactions, tokens, and review decisions.
    prompt: product-designer.md
    suggestedPhases: [design-intake, design-inventory, visual-verification]
    worldModelViews: [business, architecture, testing]
    mayApprove: [design-intake, design-inventory, visual-verification, conformance]
  mobile-architect:
    label: Mobile architect
    description: Map approved designs to a maintainable mobile design system, navigation model, implementation contract, and test strategy.
    prompt: mobile-architect.md
    suggestedPhases: [component-mapping, mobile-spec]
    worldModelViews: [architecture, development, testing, security]
    mayApprove: [component-mapping, mobile-spec, conformance]

workTypes:
  feature:
    label: Feature
    phases: [intake, requirements, design, implementation-spec, implementation, verification, conformance]
    templateOverrides:
      intake: feature/intake.md
      requirements: feature/requirements.md
      design: feature/design.md
      implementation-spec: feature/implementation-spec.md
    phaseOverrides:
      requirements: { inputs: [intake] }
      design: { inputs: [requirements] }
      implementation-spec: { inputs: [requirements, design] }
      implementation: { inputs: [implementation-spec] }
      verification: { inputs: [implementation-spec, implementation] }
      conformance: { inputs: [implementation-spec, implementation, verification] }
  bugfix:
    label: Bug fix
    phases: [intake, reproduction, fix-design, fix-spec, implementation, verification, conformance]
    templateOverrides:
      intake: bugfix/intake.md
      reproduction: bugfix/reproduction.md
      fix-design: bugfix/fix-design.md
      fix-spec: bugfix/fix-spec.md
    phaseOverrides:
      reproduction: { inputs: [intake] }
      fix-design: { inputs: [reproduction] }
      fix-spec: { inputs: [reproduction, fix-design] }
      implementation: { inputs: [fix-spec] }
      verification: { inputs: [fix-spec, implementation] }
      conformance: { inputs: [fix-spec, implementation, verification] }
  chore:
    label: Chore
    phases: [intake, implementation, verification, conformance]
    templateOverrides:
      intake: chore/intake.md
    phaseOverrides:
      implementation: { inputs: [intake] }
      verification: { inputs: [implementation] }
      conformance: { inputs: [implementation, verification] }
  figma-mobile:
    label: Figma export to mobile app
    phases: [design-intake, design-inventory, component-mapping, mobile-spec, implementation, visual-verification, conformance]
    documents:
      allowedPhases: [design-intake, design-inventory]
    templateOverrides:
      design-intake: figma-mobile/design-intake.md
      design-inventory: figma-mobile/design-inventory.md
      component-mapping: figma-mobile/component-mapping.md
      mobile-spec: figma-mobile/mobile-spec.md
      implementation: figma-mobile/implementation.md
      visual-verification: figma-mobile/visual-verification.md
      conformance: figma-mobile/conformance.md
    phaseOverrides:
      design-inventory: { inputs: [design-intake] }
      component-mapping: { inputs: [design-inventory] }
      mobile-spec: { inputs: [design-inventory, component-mapping] }
      implementation: { inputs: [component-mapping, mobile-spec] }
      visual-verification: { inputs: [design-inventory, mobile-spec, implementation] }
      conformance:
        inputs: [mobile-spec, implementation, visual-verification]
        approval: { personas: [product-designer, mobile-architect, qa], minimum: 2, rejectTo: [design-inventory, component-mapping, mobile-spec, implementation, visual-verification, conformance] }
    sequenceGates:
      documentPhase: hard

phases:
  intake:
    label: Intake
    suggestedPersonas: [product-owner]
    defaultTemplate: common/intake.md
    artifact: { path: artifacts/intake/intake.md, kind: intake, minimumBytes: 200 }
    worldModel: { views: [business], depth: quick }
    writeScope: artifact-only
    approval: { personas: [product-owner], minimum: 1, rejectTo: [intake] }
  requirements:
    label: Requirements
    suggestedPersonas: [product-owner]
    defaultTemplate: feature/requirements.md
    artifact: { path: artifacts/requirements/requirements.md, kind: requirements, minimumBytes: 300 }
    worldModel: { views: [business], depth: standard }
    writeScope: artifact-only
    approval: { personas: [product-owner], minimum: 1, rejectTo: [intake, requirements] }
  design:
    label: Architecture and design
    suggestedPersonas: [architect]
    defaultTemplate: feature/design.md
    artifact: { path: artifacts/design/design.md, kind: design, minimumBytes: 300 }
    worldModel: { views: [architecture, security], depth: standard }
    writeScope: artifact-only
    approval: { personas: [architect], minimum: 1, rejectTo: [requirements, design] }
  implementation-spec:
    label: Implementation specification
    suggestedPersonas: [architect, developer]
    defaultTemplate: feature/implementation-spec.md
    artifact: { path: artifacts/implementation-spec/implementation-spec.md, kind: implementation-spec, minimumBytes: 400 }
    worldModel: { views: [architecture, development, testing, security], depth: deep }
    writeScope: artifact-only
    approval: { personas: [architect], minimum: 1, rejectTo: [requirements, design, implementation-spec] }
  reproduction:
    label: Reproduction
    suggestedPersonas: [qa, developer]
    defaultTemplate: bugfix/reproduction.md
    artifact: { path: artifacts/reproduction/reproduction.md, kind: reproduction, minimumBytes: 250 }
    worldModel: { views: [development, testing], depth: standard }
    writeScope: artifact-only
    approval: { personas: [qa], minimum: 1, rejectTo: [intake, reproduction] }
  fix-design:
    label: Fix design
    suggestedPersonas: [architect, developer]
    defaultTemplate: bugfix/fix-design.md
    artifact: { path: artifacts/fix-design/fix-design.md, kind: fix-design, minimumBytes: 250 }
    worldModel: { views: [architecture, development, security], depth: standard }
    writeScope: artifact-only
    approval: { personas: [architect], minimum: 1, rejectTo: [reproduction, fix-design] }
  fix-spec:
    label: Fix specification
    suggestedPersonas: [architect, developer]
    defaultTemplate: bugfix/fix-spec.md
    artifact: { path: artifacts/fix-spec/fix-spec.md, kind: implementation-spec, minimumBytes: 300 }
    worldModel: { views: [development, testing, security], depth: standard }
    writeScope: artifact-only
    approval: { personas: [architect], minimum: 1, rejectTo: [reproduction, fix-design, fix-spec] }
  design-intake:
    label: Design package intake
    suggestedPersonas: [product-designer]
    defaultTemplate: figma-mobile/design-intake.md
    artifact: { path: artifacts/design-intake/design-package-intake.md, kind: design-intake, minimumBytes: 350 }
    worldModel: { views: [business, architecture], depth: standard }
    writeScope: artifact-only
    approval: { personas: [product-designer], minimum: 1, rejectTo: [design-intake] }
  design-inventory:
    label: Screen and design inventory
    suggestedPersonas: [product-designer]
    defaultTemplate: figma-mobile/design-inventory.md
    artifact: { path: artifacts/design-inventory/design-inventory.md, kind: design-inventory, minimumBytes: 500 }
    worldModel: { views: [business, architecture], depth: standard }
    writeScope: artifact-only
    approval: { personas: [product-designer], minimum: 1, rejectTo: [design-intake, design-inventory] }
  component-mapping:
    label: Mobile component mapping
    suggestedPersonas: [mobile-architect, product-designer]
    defaultTemplate: figma-mobile/component-mapping.md
    artifact: { path: artifacts/component-mapping/component-mapping.md, kind: component-mapping, minimumBytes: 500 }
    worldModel: { views: [architecture, development, security], depth: deep }
    writeScope: artifact-only
    approval: { personas: [mobile-architect], minimum: 1, rejectTo: [design-inventory, component-mapping] }
  mobile-spec:
    label: Mobile implementation specification
    suggestedPersonas: [mobile-architect, developer]
    defaultTemplate: figma-mobile/mobile-spec.md
    artifact: { path: artifacts/mobile-spec/mobile-spec.md, kind: implementation-spec, minimumBytes: 700 }
    worldModel: { views: [architecture, development, testing, security], depth: deep }
    writeScope: artifact-only
    approval: { personas: [mobile-architect], minimum: 1, rejectTo: [design-inventory, component-mapping, mobile-spec] }
  implementation:
    label: Implementation
    suggestedPersonas: [developer]
    defaultTemplate: common/implementation.md
    artifact: { path: artifacts/implementation/implementation-summary.md, kind: implementation-summary, minimumBytes: 250 }
    worldModel: { views: [development, testing], depth: standard }
    writeScope: source-and-artifact
    approval: { personas: [developer], minimum: 1, rejectTo: [implementation] }
    qualityCommands: []
  verification:
    label: Verification
    suggestedPersonas: [qa]
    defaultTemplate: common/verification.md
    artifact: { path: artifacts/verification/test-evidence.md, kind: test-evidence, minimumBytes: 300 }
    worldModel: { views: [testing, development, security], depth: standard, evidence: true }
    writeScope: source-and-artifact
    approval: { personas: [qa], minimum: 1, rejectTo: [implementation, verification] }
    qualityCommands: []
  visual-verification:
    label: Mobile visual verification
    suggestedPersonas: [product-designer, qa]
    defaultTemplate: figma-mobile/visual-verification.md
    artifact: { path: artifacts/visual-verification/visual-comparison.md, kind: visual-test-evidence, minimumBytes: 600 }
    worldModel: { views: [testing, development, security], depth: deep, evidence: true }
    writeScope: source-and-artifact
    approval: { personas: [product-designer, qa], minimum: 2, rejectTo: [component-mapping, mobile-spec, implementation, visual-verification] }
    qualityCommands: []
  conformance:
    label: Spec-to-code conformance
    suggestedPersonas: [qa, architect]
    defaultTemplate: common/conformance.md
    artifact: { path: artifacts/conformance/spec-code-comparison.md, kind: conformance-report, minimumBytes: 400 }
    worldModel: { views: [architecture, development, testing, security], depth: deep, evidence: true }
    writeScope: artifact-only
    comparison: { identifiers: [acceptance-criteria, specification], verdicts: [matched, partial, missing, deviated, unplanned], exactFileLineEvidence: true }
    approval: { personas: [qa, architect], minimum: 1, rejectTo: [implementation-spec, fix-spec, implementation, verification, conformance] }

governance:
  requireAcceptanceCriteriaTags: true
  protectedPaths:
    - singularity/workflow.yml
    - singularity/agents.lock.yml
    - singularity/templates
    - singularity/personas
    - singularity/prompts
    - .github/agents
    - .claude/agents
    - plugin/agents
    - plugin/skills
    - .github/skills
    - .github/workflows/singularity-flow-approve.yml
    - .github/workflows/singularity-flow-validation.yml
