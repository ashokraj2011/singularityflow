name: Singularity Flow decisions

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  decide:
    if: github.event.issue.pull_request && (startsWith(github.event.comment.body, '/approve ') || startsWith(github.event.comment.body, '/reject '))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: echo "branch=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq .head.ref)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pinned workflow CLI
        run: npm install --global singularity-flow@0.7.2
      - name: Apply authenticated decision
        env:
          SINGULARITY_FLOW_GITHUB_ACTOR: ${{ github.actor }}
          DECISION_COMMENT: ${{ github.event.comment.body }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          action=$(printf '%s' "$DECISION_COMMENT" | awk '{print $1}')
          phase=$(printf '%s' "$DECISION_COMMENT" | awk '{print $2}')
          persona=$(printf '%s' "$DECISION_COMMENT" | awk '{print $4}')
          test "$(printf '%s' "$DECISION_COMMENT" | awk '{print $3}')" = "as"
          export SINGULARITY_FLOW_GITHUB_PERSONA="$persona"
          if [ "$action" = "/approve" ]; then
            singularity-flow approve --phase "$phase" --yes
          else
            target=$(printf '%s' "$DECISION_COMMENT" | sed -n 's/.*--to \([^ ]*\).*/\1/p')
            reason=$(printf '%s' "$DECISION_COMMENT" | sed -n 's/.*--reason "\([^"]*\)".*/\1/p')
            test -n "$target" && test -n "$reason"
            singularity-flow reject --phase "$phase" --to "$target" --reason "$reason"
          fi
